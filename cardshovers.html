<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body{
        height: 100vh;
        width: 100vw;
        background-color: white;
    }
    .datacontainer{
        height: 100%;
        width: 100%;
        justify-content: space-evenly;
        display: flex;
        align-items: center;
    }
    .card-item{
        height: 50%;
        width: 400px;
        background-color: aqua;
        position: relative;
    }
    img{
        height: 450px;
        width: 400px;
    }
    .card-overlay{
        width: 400px;
        text-align: center;
        font-size: x-large;
        position: absolute;
        bottom: 0;
        color: rgb(255, 255,255,0.5);
        transform: translateX(400px);
        transition: transform 1s;
    }
    .card-item:hover .card-overlay{
        transform: translateX(0);
    }
</style>
<body>
    <div class="datacontainer">
        <div class="card-item">
            <img src="/images/nature.jpeg" alt="">
            <div class="card-overlay">
                <h1>rushikesh</h1>
                <p>Lorem ipsum dolor sit amet consectetur,
                     adipisicing elit. Perferendis assumenda 
                     dignissimos fuga aliquam. Vitae dolor explicabo 
                     </p>

            </div>
        </div>
        <div class="card-item">
            <img src="/images/rr.jpg" alt="">
            <div class="card-overlay">
                <h1>rushikesh</h1>
                <p>Lorem ipsum dolor sit amet consectetur,
                     adipisicing elit. Perferendis assumenda 
                     dignissimos fuga aliquam. Vitae dolor explicabo 
                     </p>
            </div>
         </div>
    </div>
    
</body>
</html>
